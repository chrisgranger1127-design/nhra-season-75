<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NHRA 2026">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="2026 NHRA Mission Foods Drag Racing Series — Full season schedule with weekend itineraries, auto-converted to Eastern Time.">

  <title>NHRA 2026</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="icons/splash.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <rect width="40" height="40" rx="8" fill="#E8161A"/>
          <!-- checkered flag blocks -->
          <rect x="8"  y="8"  width="6" height="6" fill="#fff"/>
          <rect x="14" y="8"  width="6" height="6" fill="#E8161A"/>
          <rect x="20" y="8"  width="6" height="6" fill="#fff"/>
          <rect x="26" y="8"  width="6" height="6" fill="#E8161A"/>
          <rect x="8"  y="14" width="6" height="6" fill="#E8161A"/>
          <rect x="14" y="14" width="6" height="6" fill="#fff"/>
          <rect x="20" y="14" width="6" height="6" fill="#E8161A"/>
          <rect x="26" y="14" width="6" height="6" fill="#fff"/>
          <!-- flag pole -->
          <rect x="8" y="8" width="3" height="26" rx="1.5" fill="#fff"/>
          <!-- speed lines -->
          <path d="M18 27 L34 27" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
          <path d="M16 32 L34 32" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <div>
          <div class="logo-title">NHRA 2026</div>
          <div class="logo-sub">Mission Foods Drag Racing</div>
        </div>
      </div>
      <div class="header-right">
        <span class="badge-anni">75th Anniversary</span>
        <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
          <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── STATS BAR ── -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-val">20</span>
      <span class="stat-lbl">Races</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="stat-remaining">—</span>
      <span class="stat-lbl">Remaining</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="stat-completed">—</span>
      <span class="stat-lbl">Completed</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item next-race-stat">
      <span class="stat-val" id="stat-next">—</span>
      <span class="stat-lbl">Next Race</span>
    </div>
  </div>

  <!-- ── FILTER TABS ── -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="upcoming">Upcoming</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="countdown">Countdown</button>
  </div>

  <!-- ── SCHEDULE ── -->
  <main class="schedule-wrap" id="schedule-list" role="list"></main>

  <!-- ── INSTALL BANNER (Android/Chrome) ── -->
  <div class="install-banner" id="install-banner" hidden>
    <div class="install-text">
      <strong>Add to Home Screen</strong>
      <span>Install the NHRA app for quick access</span>
    </div>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="install-dismiss" id="install-dismiss" aria-label="Dismiss">✕</button>
  </div>

  <!-- ── RACE DETAIL MODAL ── -->
  <div class="modal-backdrop" id="modal-backdrop" hidden aria-hidden="true"></div>
  <div class="modal-sheet" id="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-handle"></div>
    <div class="modal-scroll">
      <div class="modal-hero" id="modal-hero">
        <button class="modal-close" id="modal-close" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="modal-event-num" id="modal-event-num"></div>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-location" id="modal-location"></div>
        <div class="modal-meta-row">
          <span class="meta-chip dates-chip" id="modal-dates"></span>
          <span class="meta-chip tv-chip" id="modal-tv"></span>
        </div>
      </div>

      <div class="modal-body">
        <!-- Classes -->
        <div class="section-block">
          <h3 class="section-label">Pro Classes</h3>
          <div class="classes-row" id="modal-classes"></div>
        </div>

        <!-- Itinerary -->
        <div class="section-block">
          <h3 class="section-label">Weekend Itinerary <span class="tz-badge">All times ET</span></h3>
          <div id="itinerary-content"></div>
        </div>

        <!-- Tickets -->
        <a class="btn-tickets" id="modal-tickets" href="https://www.nhra.com/schedule/2026" target="_blank" rel="noopener noreferrer">
          🎟 Buy Tickets at NHRA.com
        </a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
