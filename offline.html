<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHRA 2026 — Offline</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
    .offline-wrap { text-align: center; padding: 2rem; }
    .offline-icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 800; color: var(--text); margin-bottom: 0.5rem; }
    p { color: var(--text-muted); margin-bottom: 1.5rem; }
    a { display: inline-block; background: var(--accent); color: #fff; padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="offline-wrap">
    <div class="offline-icon">🏁</div>
    <h1>You're Offline</h1>
    <p>The schedule data is cached and ready.<br>Go back to view it.</p>
    <a href="/">View Schedule</a>
  </div>
</body>
</html>
